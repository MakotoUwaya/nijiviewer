name: Node.js CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    # Storybook テストは @storybook/addon-vitest 経由で Playwright のブラウザモードを使うため、
    # Chromium プリインストール済みの公式イメージを利用する（playwright.yml と同じイメージ）
    container:
      image: mcr.microsoft.com/playwright:v1.59.1
    env:
      # 公式イメージは /ms-playwright にブラウザを置くが、GitHub Actions の container では
      # HOME が /github/home に書き換わるため、明示しないと ~/.cache/ms-playwright を探して失敗する
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - run: pnpm lint
      - run: pnpm test
